name: Scrape jobs

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch: {}       # lets you trigger manually from the Actions tab

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python -m scraper.main

      - name: Commit updated data
        run: |
          git config user.name "job-pipeline-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/jobs.json
          git diff --cached --quiet || git commit -m "chore: scrape jobs $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

  deploy-pages:
    needs: scrape
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Prepare site
        run: |
          mkdir -p _site
          cp -r dashboard/* _site/
          mkdir -p _site/data
          cp data/jobs.json _site/data/jobs.json

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - uses: actions/deploy-pages@v4
