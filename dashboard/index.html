<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Application Pipeline</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark">JP</div>
      <div class="brand-text">
        <div class="brand-eyebrow">JOB PIPELINE &middot; LOCAL</div>
        <div class="brand-title">Application Pipeline</div>
      </div>
    </div>

    <div class="topbar-right">
      <span class="pill pill-muted" id="last-scraped">Last scraped: —</span>
      <input id="search" class="search" type="text" placeholder="Filter by title or company…" />
      <select id="status-filter" class="select">
        <option value="all">All statuses</option>
        <option value="pending_review">Pending review</option>
        <option value="applied">Applied</option>
        <option value="rejected">Rejected</option>
      </select>
    </div>
  </header>

  <main class="board" id="board">
    <!-- Tier columns injected by app.js -->
  </main>

  <template id="job-card-template">
    <article class="card">
      <div class="card-main">
        <h3 class="card-title"></h3>
        <p class="card-sub"></p>
        <div class="card-footer">
          <button class="status-badge" type="button"></button>
          <span class="meta"></span>
        </div>
      </div>
      <div class="score-ring">
        <svg viewBox="0 0 64 64">
          <circle class="ring-track" cx="32" cy="32" r="28"></circle>
          <circle class="ring-fill" cx="32" cy="32" r="28"></circle>
        </svg>
        <span class="score-value"></span>
      </div>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
